

{% extends "layout.html" %}
{% block content %}

<div class="container mt-5">
    <div class="card shadow border-0">
        <div class="card-header bg-danger text-white"><h5>Caste Certificate Application</h5></div>
        <div class="card-body">
            <form action="/submit_detailed_app" method="POST">
                <input type="hidden" name="service_name" value="Caste Certificate">
                <div class="mb-3">
                    <label>Community/Sub-Caste Name</label>
                    <input type="text" name="new_name" class="form-control" placeholder="Enter your caste" required>
                </div>
                <div class="mb-3">
                    <label>Father's Name & Native Address</label>
                    <textarea name="new_address" class="form-control" rows="3" required></textarea>
                </div>
                <div class="mb-3">
                    <label>Aadhar Number</label>
                    <input type="text" name="contact" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-danger w-100">Submit to Tehsildar Office</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
