{% extends "layout.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-lg p-4 border-0">
            <h3 class="text-center mb-4">New Citizen Registration</h3>
            <form action="/register_user" method="POST">
                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" name="name" class="form-control" placeholder="John Doe" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email" name="email" class="form-control" placeholder="john@example.com" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Secure Password</label>
                    <input type="password" name="password" class="form-control" required>
                    <small class="text-muted">Passwords are encrypted for your safety.</small>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2">Create Secure Account</button>
            </form>
            <hr>
            <p class="text-center">Already registered? <a href="/">Login here</a></p>
        </div>
    </div>
</div>
{% endblock %}
