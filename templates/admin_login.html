<!DOCTYPE html>
<html>
<head>
    <title>Admin Login - GovSecure</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark">
    <div class="container d-flex align-items-center justify-content-center" style="min-height: 100vh;">
        <div class="card shadow-lg" style="width: 400px; border-radius: 15px;">
            <div class="card-body p-4">
                <h3 class="text-center mb-4">Admin Authentication</h3>
                <form action="/login_user" method="POST">
                    <div class="mb-3">
                        <label class="form-label">Admin Email</label>
                        <input type="email" name="email" class="form-control" placeholder="admin@gov.in" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-dark w-100">Login to Secure Panel</button>
                </form>
                <div class="text-center mt-3">
                    <a href="/" class="small text-decoration-none">← Back to Citizen Login</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
