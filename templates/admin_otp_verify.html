<div class="container mt-5 text-center">
    <h3>Application Verification</h3>
    <p>Please enter the 6-digit OTP sent to the applicant's registered contact.</p>
    <form action="/admin/verify_otp" method="POST" class="d-inline-block">
        <input type="text" name="otp" class="form-control mb-3" placeholder="Enter OTP" required>
        <button type="submit" class="btn btn-primary">Confirm & Approve</button>
    </form>
</div>
