<!DOCTYPE html>
<html>
<head>
    <title>Verify Application</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card mx-auto shadow" style="max-width: 400px;">
            <div class="card-body text-center">
                <h3>OTP Verification</h3>
                <p class="text-muted">Enter the code sent to the applicant's phone.</p>
                <form action="/admin/confirm_verify" method="POST">
                    <input type="text" name="otp" class="form-control mb-3" placeholder="Enter 6-digit OTP" required>
                    <button type="submit" class="btn btn-success w-100">Confirm & Approve</button>
                </form>
                <a href="/admin/dashboard" class="d-block mt-3 small text-decoration-none">Cancel</a>
            </div>
        </div>
    </div>
</body>
</html>
